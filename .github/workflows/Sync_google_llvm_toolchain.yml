name: Sync llvm-project to GitHub
on:
  workflow_dispatch:  # 手动触发

jobs:
  mirror-repo:
    runs-on: ubuntu-latest
    steps:
      - name: 配置 Git
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

      - name: 镜像克隆源仓库
        run: git clone --mirror https://android.googlesource.com/toolchain/llvm-project llvm-mirror.git

      - name: 推送到目标 GitHub 仓库
        run: |
          cd llvm-mirror.git
          # 替换为你的 GitHub 仓库地址
          git remote set-url origin https://${{ secrets.GITHUB_TOKEN }}@github.com/kquieter-debug/Save_android_llvm_toolchain.git
          git push --mirror